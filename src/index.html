<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link href="./output.css" rel="stylesheet">
    <title>Quote Generator</title>
</head>
<body> 
    <div id="container" class="flex flex-col p-8 py-7 text-xl font-mono bg-fuchsia-100 text-gray-800 h-screen">
        <nav>
            <h1 class="text-center text-2xl font-extrabold [-webkit-text-fill-color:transparent]  [-webkit-text-stroke:1px_purple]">Quote Generator</h1>
        </nav>
        
        <p class="text-center text-lg pt-5">Generate inspiring quotes with a single click!</p>



        <!-- Quote Container -->
        <div id="quote-container" class="flex flex-col border h-[60vh] p-5 justify-between mt-7 rounded-sm bg-taupe-300">
            <div id="quote" class=" min-h-[87%] border rounded-sm p-3 flex flex-col justify-center bg-violet-50">
                 
            </div>

            <p id="error-message" class="hidden">

            </p>

            <!-- Share Buttons -->
            <div id="share-buttons" class="flex gap-2 self-end">
                <p class="text-sm  m-auto">Share this quote:</p>
                <span id="copy-quote" class="material-symbols-outlined">content_copy</span>

                <!-- X (twitter) -->
                <svg 
                    id="twitter-share"
                    width="18"
                    height="18"
                    role="img" 
                    viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <title>X</title>
                    <path 
                    d="M14.234 10.162 22.977 0h-2.072l-7.591 8.824L7.251 
                    0H.258l9.168 13.343L.258 24H2.33l8.016-9.318L16.749 24h6.993zm-2.837 
                    3.299-.929-1.329L3.076 1.56h3.182l5.965 8.532.929 1.329 7.754 11.09h-3.182z"/>
                </svg>

                <!-- whatsapp -->
                 <svg 
                 id="whatsapp-share"
                 width="18"
                 height="18"   
                 role="img" 
                 viewBox="0 0 24 24" 
                 xmlns="http://www.w3.org/2000/svg">
                 <title>WhatsApp</title>
                 <path 
                 d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                </svg>

                <!-- download button -->
                <button id="download-quote" class="material-symbols-outlined">download</button>
            </div>
        </div>

        <!-- Generate Quote Button -->
        <button id="generate-button" class="border text-[16px] mt-5 w-fit self-center p-2 rounded-sm bg-violet-400 font-bold text-gray-700">Generate Quote</button>

    </div>

    <script src="./script.js"></script>
  
</body>
</html>
